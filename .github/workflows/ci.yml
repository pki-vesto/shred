name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api-unit:
    name: API unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install API dependencies
        run: npm install --no-audit --no-fund

      - name: Run deterministic core test
        run: node test-core.mjs

      - name: Run deterministic sync-contract test
        run: node test-sync.mjs
