<?xml version="1.0" encoding="UTF-8"?>
<!-- Shred app icon. The signature motif: 9-cell program grid (a fragment of
     the 90-day "DNA"). Dark cool-tinted background, amber-on for completed
     cells. Same composition is rendered into PNGs by generate.py. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="15" fill="#15181b"/>
  <g fill="#303338">
    <circle cx="18" cy="18" r="3"/>
    <circle cx="32" cy="18" r="3"/>
    <circle cx="46" cy="18" r="3"/>
    <circle cx="18" cy="32" r="3"/>
    <circle cx="46" cy="46" r="3"/>
  </g>
  <g fill="#f2a73c">
    <circle cx="46" cy="32" r="3"/>
    <circle cx="32" cy="32" r="3"/>
    <circle cx="32" cy="46" r="3"/>
    <circle cx="18" cy="46" r="3"/>
  </g>
</svg>
